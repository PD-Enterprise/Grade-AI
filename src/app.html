<!doctype html>
<html lang="en" data-theme="black">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#000000" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta
			name="description"
			content="Grade AI — AI-powered academic grading assistant with direct answers and Socratic teaching modes. Learn faster with adaptive AI tutoring."
		/>
		<meta
			name="keywords"
			content="AI, grading assistant, education, Socratic learning, tutoring, academic help, Grade AI, artificial intelligence"
		/>
		<meta name="robots" content="index, follow" />
		<meta name="author" content="PD Enterprise" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="apple-touch-icon" href="/icons/apple-icon-180.png" />
		<link rel="icon" href="/logo.webp" type="image/webp" />
		<meta property="og:title" content="Grade AI" />
		<meta
			property="og:description"
			content="AI-powered academic grading assistant with direct answers and Socratic teaching modes."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://grade-ai.pages.dev" />
		<meta property="og:image" content="/logo.webp" />
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="Grade AI" />
		<meta
			name="twitter:description"
			content="AI-powered academic grading assistant with direct answers and Socratic teaching modes."
		/>
		<meta name="twitter:image" content="/logo.webp" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			if ('serviceWorker' in navigator) {
				window.addEventListener('load', () => {
					navigator.serviceWorker.register('/sw.js');
				});
			}
		</script>
	</body>
</html>
